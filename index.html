<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福利彩票选号系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .container { 
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.9; }
        .content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            font-size: 14px; 
            color: #333; 
            margin-bottom: 5px;
            font-weight: 500;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #f5576c; }
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white; 
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 15px;
        }
        .menu-item { 
            padding: 15px 10px; 
            background: #f8f9fa; 
            border: 2px solid #e9ecef; 
            border-radius: 10px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .menu-item:hover { 
            background: #f093fb; 
            border-color: #f5576c; 
            color: white; 
            transform: translateY(-3px);
        }
        .menu-item:active { transform: translateY(0); }
        .menu-item .icon { font-size: 24px; margin-bottom: 5px; }
        .menu-item .text { font-size: 14px; font-weight: 500; }
        .user-info { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px;
            font-size: 14px;
        }
        .logout-btn { 
            background: #6c757d; 
            color: white; 
            padding: 8px 16px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
            float: right;
        }
        .clearfix { overflow: hidden; }
        .message { 
            padding: 10px; 
            border-radius: 5px; 
            margin-bottom: 15px; 
            display: none;
            font-size: 14px;
        }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .stats { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px; 
            padding: 10px;
            background: #e9ecef;
            border-radius: 8px;
            font-size: 12px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-weight: bold; color: #f5576c; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录界面 -->
        <div id="loginSection">
            <div class="header">
                <h1>🎰 福利彩票选号</h1>
                <p>请登录您的账号</p>
            </div>
            <div class="content">
                <div id="messageBox" class="message"></div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" value="">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" value="">
                </div>
                <button class="btn btn-primary" onclick="login()">登录</button>
            </div>
        </div>

        <!-- 主菜单界面 -->
        <div id="menuSection" style="display: none;">
            <div class="header">
                <h1>🎰 执元彩票系统</h1>
                <p>欢迎使用执元福利彩票选号系统</p>
            </div>
            <div class="content">
                <div class="user-info clearfix">
                    <span id="currentUserInfo"></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
                <div class="menu-grid">
                    <div class="menu-item" onclick="goTo('lottery.html')">
                        <div class="icon">🎲</div>
                        <div class="text">彩票选号</div>
                    </div>
                    <div class="menu-item" onclick="goTo('account.html')">
                        <div class="icon">👤</div>
                        <div class="text">账号管理</div>
                    </div>
                    <div class="menu-item" onclick="goTo('lo_date.html')">
                        <div class="icon">📊</div>
                        <div class="text">历史数据</div>
                    </div>
                    <div class="menu-item" onclick="goTo('lottery.html?tab=my')">
                        <div class="icon">📝</div>
                        <div class="text">我的选号</div>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalUsers">-</div>
                        <div>注册用户</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalSelections">-</div>
                        <div>总选号数</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1a6af2d8d7ddff8d605fd4925b5624c5';
        const API_URL = 'https://api2.tanshuapi.com/api/caipiao/v1/query';

        // 显示消息
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.className = 'message ' + type;
            box.textContent = text;
        }

        // 登录（用户名在内部映射成邮箱，交给 Supabase Auth 处理）
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: usernameToEmail(username),
                password
            });

            if (error) {
                showMessage('用户名或密码错误', 'error');
                return;
            }

            const profile = await getCurrentUserProfile();
            if (!profile) {
                showMessage('登录异常：找不到账号信息，请联系管理员', 'error');
                return;
            }
            showLoginSuccess(profile);
        }

        // 登录成功
        function showLoginSuccess(profile) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('menuSection').style.display = 'block';
            const roleText = profile.role === 'admin' ? '管理员' : '普通用户';
            document.getElementById('currentUserInfo').innerHTML = `<strong>${profile.username}</strong> (${roleText})`;
            updateStats();
        }

        // 退出登录
        async function logout() {
            await logoutCurrentUser();
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('menuSection').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            showMessage('已退出登录', 'success');
        }

        // 跳转页面
        function goTo(url) {
            window.location.href = url;
        }

        // 更新统计信息
        async function updateStats() {
            const { count: userCount } = await supabaseClient
                .from('profiles')
                .select('*', { count: 'exact', head: true });
            const { count: selectionCount } = await supabaseClient
                .from('selections')
                .select('*', { count: 'exact', head: true });

            document.getElementById('totalUsers').textContent = userCount ?? '-';
            document.getElementById('totalSelections').textContent = selectionCount ?? '-';
        }

        // 检查是否已登录
        async function checkLogin() {
            const profile = await getCurrentUserProfile();
            if (profile) {
                showLoginSuccess(profile);
            }
        }

        // 回车键登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // 页面加载
        checkLogin();
    </script>
</body>
</html>
